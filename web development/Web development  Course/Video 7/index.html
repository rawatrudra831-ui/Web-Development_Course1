<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form - lets learn it</title>
</head>
<body>
    <h1>Form for managing data</h1>
    <form action="post">
        <div>
        <label for="username">Enter your username:</label>
        <input type="text" name="username" placeholder="Enter your username" autofocus>
        </div>
            <input type="radio" id="male" name="gender" value="male">
            <label for="male">Male</label>
            <input type="radio" id="female" name="gender" Value="female">
            <label for="female">Female</label>
        <div>

        <div>
            <input type="checkbox" id="subscribe" name="subscribe" value="yes">
<label for="subscribe">Subscribe to newsletter</label>
        </div>
        <div>
            <label for="comment">Enter your comment:</label>
            <br>
            <textarea id="comment" name="comment" rows="4" cols="50">
</textarea>
        </div>

        <div>
            <select name="fruits">
                <option value="Rudra">Rudra</option>
                <option value="Gogi">Gogi</option>
                <option value="Mbappu">Mbappu</option>
            </select>
        </div>
    </form>
</body>
</html>
